# Longhorn File Browser — k3s deployment
#
# Apply with:   kubectl apply -f k8s/filemanager-deployment.yaml
#
# Everything is deployed into the "filemanager" namespace (created below),
# including the Longhorn PVC that backs the browser — a single
# `kubectl apply` provisions the namespace, volume, Deployment and Service.
#
# Prerequisites:
#   * Longhorn is installed with a StorageClass named "longhorn" that supports
#     ReadWriteMany (RWX). If your class has a different name, edit the PVC's
#     storageClassName near the bottom of this file.
#   * The GHCR package ghcr.io/linderp1/vscode-filemanager is PUBLIC, so no
#     imagePullSecret is required.
---
apiVersion: v1
kind: Namespace
metadata:
  name: filemanager
  labels:
    app: filemanager
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: filemanager
  namespace: filemanager
  labels:
    app: filemanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: filemanager
  template:
    metadata:
      labels:
        app: filemanager
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: filemanager
          image: ghcr.io/linderp1/vscode-filemanager:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: DATA_ROOT
              value: /data
          volumeMounts:
            - name: data
              mountPath: /data
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: longhorn-shared
            readOnly: true
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: filemanager
  namespace: filemanager
  labels:
    app: filemanager
  annotations:
    # MetalLB 0.13+ honors this annotation; spec.loadBalancerIP below is
    # deprecated (k8s 1.24+) but kept for compatibility with older setups.
    metallb.universe.tf/loadBalancerIPs: 192.168.2.233
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.2.233
  selector:
    app: filemanager
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
# -----------------------------------------------------------------------------
# Shared volume backing the browser. Longhorn provisions a volume the moment
# this PVC is created (ReadWriteMany uses Longhorn's NFS-based RWX support).
# If your Longhorn StorageClass is not named "longhorn", change storageClassName.
# -----------------------------------------------------------------------------
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: longhorn-shared
  namespace: filemanager
  labels:
    app: filemanager
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: longhorn
  resources:
    requests:
      storage: 20Gi
